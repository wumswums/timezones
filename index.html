    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'CFAsty', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .main {
      flex: 1;
      padding: 32px 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .logo-img {
      height: 30px;
      width: auto;
      display: block;
    }


    /* ── Cards ── */
    .clock-card {
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e4e3df;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
    }

    .card-left { display: flex; flex-direction: column; min-width: 185px; flex-shrink: 0; }
    .city-row  { display: flex; align-items: center; gap: 6px; }
    .flag      { font-size: 15px; line-height: 1; }
    .city      { font-size: 15px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.1px; }

    .tz-badge {
      font-size: 10px; font-weight: 500;
      color: #555; background: #ebebeb;
      border-radius: 999px; padding: 1px 6px; letter-spacing: 0.03em;
    }

    .time {
      font-size: 30px; font-weight: 700; color: #1a1a1a;
      letter-spacing: -0.8px; font-variant-numeric: tabular-nums;
      line-height: 1.1; margin-top: 3px;
    }

    .date-display { font-size: 11px; color: #b5b3ae; margin-top: 4px; display: flex; align-items: center; gap: 5px; }

    .v-divider { width: 1px; height: 46px; background: #e4e3df; flex-shrink: 0; }

    .people { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }

    .person {
      display: flex; align-items: center; gap: 6px;
      background: #f7f6f3; border: 1px solid #e4e3df;
      border-radius: 20px; padding: 4px 10px 4px 5px;
      text-decoration: none; cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
    }
    .person:hover { background: #eceae4; border-color: #d5d3ce; }

    /* mobile: pill becomes just the avatar circle */
    @media (max-width: 600px) {
      .person { padding: 3px; border-radius: 50%; }
      .person-name { display: none; }
    }

    .avatar {
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff;
      background: #8a9099; /* soft grey — lower contrast */
      text-transform: uppercase; flex-shrink: 0;
    }

    .person-name { font-size: 12px; font-weight: 500; color: #37352f; white-space: nowrap; }

    /* ── Timeline ── */
    .h-divider { height: 1px; background: #f0efeb; }

    .timeline-scroll {
      overflow-x: scroll; overflow-y: hidden;
      scrollbar-width: none; -ms-overflow-style: none;
      cursor: grab; background: #c5cdd4;
    }
    .timeline-scroll::-webkit-scrollbar { display: none; }
    .timeline-scroll.grabbing { cursor: grabbing; }

    /* Single-row track */
    .hour-track {
      display: flex;
      height: 22px;
      width: max-content;
    }

    .hour-col {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9.5px;
      font-variant-numeric: tabular-nums;
      color: #777;
      border-right: 1px solid rgba(0,0,0,0.07);
      user-select: none;
      cursor: pointer;
      transition: filter 0.1s;
      white-space: nowrap;
    }
    .hour-col:hover:not(.current) { filter: brightness(0.92); }
    .hour-col:last-child { border-right: none; }

    /* Midnight = new day: stronger left border */
    .hour-col.midnight {
      border-left: 2px solid rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .hour-col.current {
      color: #fff;
      font-weight: 700;
      border-radius: 4px;
    }

    /* ── Copy popup ── */
    #copy-popup {
      display: none;
      position: fixed;
      z-index: 100;
      background: #fff;
      border: 1px solid #e4e3df;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.14);
      min-width: 240px;
      max-width: 300px;
    }

    #copy-popup .popup-title {
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #9b9a97; margin-bottom: 10px;
    }

    #copy-popup .popup-select-all {
      font-size: 10.5px; font-weight: 500; color: #aaa;
      cursor: pointer; margin-bottom: 4px; text-align: right;
      letter-spacing: 0.02em; user-select: none;
    }
    #copy-popup .popup-select-all:hover { color: #333; }

    #copy-popup .popup-city-block {
      display: flex; align-items: flex-start; gap: 9px;
      padding: 7px 4px; border-bottom: 1px solid #f5f4f0;
      width: 100%; cursor: pointer; border-radius: 6px;
      margin: 0 -4px; width: calc(100% + 8px);
    }
    #copy-popup .popup-city-block:last-of-type { border-bottom: none; }
    #copy-popup .popup-city-block:hover { background: #f7f6f3; }
    #copy-popup .popup-city-block.unchecked { opacity: 0.45; }

    #copy-popup .popup-city-block input[type="checkbox"] {
      margin-top: 3px; flex-shrink: 0; cursor: pointer;
      accent-color: #111; width: 14px; height: 14px;
    }

    #copy-popup .popup-city-info { display: flex; flex-direction: column; gap: 2px; flex: 1; }

    #copy-popup .popup-city-name {
      font-size: 13px; font-weight: 600; color: #1a1a1a;
      display: flex; align-items: center; gap: 6px;
    }
    #copy-popup .popup-tz {
      font-size: 10px; font-weight: 500; color: #888;
      background: #f0efeb; border-radius: 3px; padding: 1px 4px;
    }
    #copy-popup .popup-day-time {
      font-size: 11.5px; color: #777;
      font-variant-numeric: tabular-nums;
    }
    #copy-popup .popup-day-time strong {
      color: #333; font-weight: 600;
    }

    #copy-popup .popup-actions {
      display: flex; gap: 8px; margin-top: 12px;
    }

    #copy-popup .btn-copy {
      flex: 1; background: #1a1a1a; color: #fff;
      border: none; border-radius: 6px; padding: 7px 12px;
      font-family: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background 0.12s;
    }
    #copy-popup .btn-copy:hover { background: #333; }
    #copy-popup .btn-copy.copied { background: #2ECC40; }

    #copy-popup .btn-close {
      background: #f0efeb; color: #555;
      border: none; border-radius: 6px; padding: 7px 10px;
      font-family: inherit; font-size: 12px; cursor: pointer;
    }
    #copy-popup .btn-close:hover { background: #e4e3df; }

    /* ── Footer ── */
    footer {
      background: #111; color: #fff;
      padding: 24px 20px;
    }

    .footer-inner {
      max-width: 900px; margin: 0 auto;
    }

    .footer-social { display: flex; flex-wrap: wrap; gap: 8px; }

    .social-link {
      display: flex; align-items: center; gap: 7px;
      color: #999; text-decoration: none;
      font-size: 11.5px; font-weight: 500;
      padding: 6px 12px 6px 9px;
      border: 1px solid #2a2a2a; border-radius: 20px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .social-link:hover { color: #fff; border-color: #444; background: #1e1e1e; }
    .social-link svg { width: 13px; height: 13px; flex-shrink: 0; fill: currentColor; }

  </style>
</head>

<script>
  // Cities sorted most-ahead timezone first
  // Colors: dominant flag color matched from graphic palette
  // 🇰🇷 Korea: Red     → #E8231A
  // 🇬🇷 Greece: Blue   → #1565C0
  // 🇦🇹 Austria: Red   → #E91E8C  (palette hot-pink, distinct from Korea red)
  // 🇺🇸 USA: Red       → Utah #FF5500 / LA #E8231A (two shades, red-family)
  const cities = [
    { name: "Seoul",                   flag: "🇰🇷", tz: "Asia/Seoul",          color: "#E8231A", people: ["Thomas"] },
    { name: "Thessaloniki",            flag: "🇬🇷", tz: "Europe/Athens",       color: "#1565C0", people: ["Kostas", "Dimitris", "Orestis", "Alexis"] },
    { name: "Vienna",                  flag: "🇦🇹", tz: "Europe/Vienna",       color: "#E91E8C", people: ["Philipp"] },
    { name: "Utah",                    flag: "🇺🇸", tz: "America/Denver",      color: "#FF5500", people: ["Tammie"] },
    { name: "Los Angeles",             flag: "🇺🇸", tz: "America/Los_Angeles", color: "#E8231A", people: ["Josh", "Alice"] },
  ];

  // Sort by UTC offset (descending = most ahead first)
  function getOffset(tz) {
    const now = new Date();
    const a = new Date(now.toLocaleString("en-US", { timeZone: tz }));
    const b = new Date(now.toLocaleString("en-US", { timeZone: "UTC" }));
    return Math.round((a - b) / 60000);
  }
  cities.sort((a, b) => getOffset(b.tz) - getOffset(a.tz));

  const avatarPalette = ["#E8231A","#1565C0","#E91E8C","#FF5500","#2ECC40","#7B2FBE","#00B4D8","#FFB300"];
  function nameToColor(name) {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
    return avatarPalette[Math.abs(h) % avatarPalette.length];
  }

  function getUTCOffset(tz, now) {
    const a = new Date(now.toLocaleString("en-US", { timeZone: tz }));
    const b = new Date(now.toLocaleString("en-US", { timeZone: "UTC" }));
    const d = Math.round((a - b) / 60000);
    const sign = d >= 0 ? "+" : "−";
    const hh = Math.floor(Math.abs(d) / 60), m = Math.abs(d) % 60;
    return m === 0 ? `UTC${sign}${hh}` : `UTC${sign}${hh}:${String(m).padStart(2,"0")}`;
  }

  // One column = one hour (display). Internally still 30-min precision for popup.
  const SLOT_MIN = 60;          // visual columns are 1 hour each
  const SLOT_MS  = SLOT_MIN * 60_000;
  const PAST     = 24;          // 24 h of history
  const FUTURE   = 48;          // 48 h ahead
  const TOTAL    = PAST + FUTURE;
  const COL_W    = 44;          // px per hour column

  function getBase() {
    const t = new Date();
    t.setMinutes(0, 0, 0);      // round down to whole hour
    return new Date(t.getTime() - PAST * SLOT_MS);
  }
  function slotAt(ms, i) { return new Date(ms + i * SLOT_MS); }

  function localHourNum(d, tz) {
    return parseInt(d.toLocaleString("en-US",{timeZone:tz,hour:"numeric",hour12:false}),10) % 24;
  }
  function fmtDate(d, tz) {
    return d.toLocaleDateString("en-US",{timeZone:tz,weekday:"short",month:"short",day:"numeric"});
  }
  // Compact date label for midnight chip: "Mon\n30"
  function midnightLabel(d, tz) {
    const day = d.toLocaleDateString("en-US",{timeZone:tz, weekday:"short"});
    const num = d.toLocaleDateString("en-US",{timeZone:tz, day:"numeric"});
    return `${day}\n${num}`;
  }
  // Popup time string (full precision, 30-min aware)
  function fmtPopupTime(d, tz) {
    return d.toLocaleString("en-US",{
      timeZone:tz, hour:"numeric", minute:"2-digit", hour12:true
    }).replace(/\s?AM/i," am").replace(/\s?PM/i," pm").trim();
  }
  function fmtDateLong(d, tz) {
    return d.toLocaleDateString("en-US",{timeZone:tz,weekday:"long",month:"long",day:"numeric",year:"numeric"});
  }

  // ── Sync scroll ──────────────────────────────────────
  const allScrollEls = [];
  let syncing = false;
  function syncScroll(src) {
    if (syncing) return; syncing = true;
    allScrollEls.forEach(el => { if (el !== src) el.scrollLeft = src.scrollLeft; });
    syncing = false;
    updateSelIndicator();
  }
  function makeDraggable(el) {
    let sx, ss, down = false;
    el.addEventListener("mousedown", e => { down=true; sx=e.pageX; ss=el.scrollLeft; el.classList.add("grabbing"); });
    window.addEventListener("mouseup",   () => { down=false; el.classList.remove("grabbing"); });
    window.addEventListener("mousemove", e => { if (down) { el.scrollLeft = ss-(e.pageX-sx); } });
  }

  // ── WorldTimeBuddy vertical selection indicator ───────
  const selIndicator = document.getElementById("sel-indicator");
  let selSlotMs = null;

  function updateSelIndicator() {
    if (!selSlotMs || !allScrollEls.length) { selIndicator.style.display = "none"; return; }

    const firstTrack = allScrollEls[0].querySelector(".hour-track");
    if (!firstTrack) { selIndicator.style.display = "none"; return; }

    // selSlotMs may be :00 or :30 — find the parent full-hour column
    const HOUR_MS = 60 * 60_000;
    const HALF_MS = 30 * 60_000;
    const baseMs  = selSlotMs - (selSlotMs % HOUR_MS);  // strip to :00
    const isHalf  = (selSlotMs % HOUR_MS) === HALF_MS;  // true = :30 half

    const target = Array.from(firstTrack.children).find(
      el => parseInt(el.dataset.slotMs) === baseMs
    );
    if (!target) { selIndicator.style.display = "none"; return; }

    const colRect = target.getBoundingClientRect();
    const halfW   = colRect.width / 2;
    const topEl   = allScrollEls[0].getBoundingClientRect();
    const botEl   = allScrollEls[allScrollEls.length - 1].getBoundingClientRect();

    selIndicator.style.display = "block";
    selIndicator.style.left   = (colRect.left + (isHalf ? halfW : 0)) + "px";
    selIndicator.style.top    = topEl.top + "px";
    selIndicator.style.width  = halfW + "px";
    selIndicator.style.height = (botEl.bottom - topEl.top) + "px";
  }

  // Hide indicator on outside click
  document.addEventListener("click", e => {
    if (!e.target.classList.contains("hour-col")) {
      selSlotMs = null;
      selIndicator.style.display = "none";
    }
  });

  window.addEventListener("scroll", updateSelIndicator, { passive: true });
  window.addEventListener("resize", updateSelIndicator);

  // ── Copy popup ───────────────────────────────────────
  const popup          = document.getElementById("copy-popup");
  const popupTitle     = document.getElementById("popup-title");
  const popupRows      = document.getElementById("popup-rows");
  const popupSelectAll = document.getElementById("popup-select-all");
  const btnCopy        = document.getElementById("btn-copy");
  const btnClose       = document.getElementById("btn-close");

  // Stores per-city row data for re-building copy text on checkbox change
  let popupCityData = [];

  function rebuildCopyText() {
    const lines = popupCityData
      .filter(d => d.checked)
      .map(d => `${d.flag} ${d.name} (${d.utcOff})\n${d.dayStr} · ${d.timeStr}`);
    return lines.join("\n\n");
  }

  function updateSelectAllLabel() {
    const allChecked = popupCityData.every(d => d.checked);
    popupSelectAll.textContent = allChecked ? "deselect all" : "select all";
  }

  popupSelectAll.addEventListener("click", () => {
    const allChecked = popupCityData.every(d => d.checked);
    popupCityData.forEach(d => { d.checked = !allChecked; d.cb.checked = !allChecked; d.block.classList.toggle("unchecked", allChecked); });
    updateSelectAllLabel();
  });

  btnClose.addEventListener("click", () => { popup.style.display = "none"; });
  btnCopy.addEventListener("click", () => {
    const text = rebuildCopyText();
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      btnCopy.textContent = "yay 🎉";
      btnCopy.classList.add("copied");
      setTimeout(() => { btnCopy.textContent = "Copy for email"; btnCopy.classList.remove("copied"); }, 2000);
    });
  });

  document.addEventListener("click", e => {
    if (!popup.contains(e.target) && !e.target.classList.contains("hour-col")) {
      popup.style.display = "none";
    }
  });

  function showPopup(slotMs, clickX, clickY) {
    const slotDate = new Date(slotMs);

    popupTitle.textContent = "Time across locations";
    popupRows.innerHTML = "";
    popupCityData = [];

    cities.forEach(city => {
      const utcOff = getUTCOffset(city.tz, slotDate);

      const timeStr = fmtPopupTime(slotDate, city.tz);

      const dayStr = slotDate.toLocaleDateString("en-US", {
        timeZone: city.tz, weekday: "long", month: "long", day: "numeric"
      });

      const block = document.createElement("div");
      block.className = "popup-city-block";

      const cb = document.createElement("input");
      cb.type = "checkbox"; cb.checked = true;

      const info = document.createElement("div");
      info.className = "popup-city-info";
      info.innerHTML = `
        <div class="popup-city-name">${city.flag} ${city.name} <span class="popup-tz">${utcOff}</span></div>
        <div class="popup-day-time">${dayStr} · <strong>${timeStr}</strong></div>
      `;

      block.appendChild(cb);
      block.appendChild(info);
      popupRows.appendChild(block);

      const entry = { flag: city.flag, name: city.name, utcOff, timeStr, dayStr, checked: true, cb, block };
      popupCityData.push(entry);

      // Toggle check on row or checkbox click
      block.addEventListener("click", e => {
        if (e.target !== cb) cb.checked = !cb.checked;
        entry.checked = cb.checked;
        block.classList.toggle("unchecked", !cb.checked);
        updateSelectAllLabel();
      });
      cb.addEventListener("click", e => e.stopPropagation());
    });

    updateSelectAllLabel();

    // Position popup near click, keep within viewport
    popup.style.display = "block";
    const pw = popup.offsetWidth  || 300;
    const ph = popup.offsetHeight || 260;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const x  = Math.min(clickX + 24, vw - pw - 12);
    const y  = Math.min(clickY + 8,  vh - ph - 12);
    popup.style.left = x + "px";
    popup.style.top  = y + "px";
    btnCopy.textContent = "Copy for email";
    btnCopy.classList.remove("copied");
  }

  // ── WorldTimeBuddy color bands ───────────────────────
  // Matches WTB's night/morning/work/evening/night gradient
  function slotBg(localHour) {
    if (localHour >= 22 || localHour < 6)  return "#c5cdd4"; // night — dark blue-grey
    if (localHour < 8)                      return "#d8e2e8"; // early morning
    if (localHour < 9)                      return "#e6eef3"; // morning transition
    if (localHour < 18)                     return "#f2f2f2"; // work hours — light grey
    if (localHour < 20)                     return "#e6eef3"; // early evening
    if (localHour < 22)                     return "#d8e2e8"; // late evening
    return "#c5cdd4";
  }
  function slotFg(localHour) {
    if (localHour >= 22 || localHour < 6)  return "#5a6a75";
    if (localHour < 9 || localHour >= 20)  return "#4d6370";
    return "#3a3a3a";
  }

  // ── Build cards ──────────────────────────────────────
  const main = document.querySelector(".main");
  let baseMs;  // set after building

  cities.forEach(city => {
    const sid  = city.tz.replace("/","_") + "_" + city.name.replace(/\s/g,"");
    const card = document.createElement("div"); card.className = "clock-card";
    const top  = document.createElement("div"); top.className  = "card-top";
    const left = document.createElement("div"); left.className = "card-left";

    left.innerHTML = `
      <div class="city-row">
        <span class="flag">${city.flag}</span>
        <span class="city">${city.name}</span>
      </div>
      <div class="time" id="time_${sid}">--:--:--</div>
      <div class="date-display"><span id="dated_${sid}">...</span><span class="tz-badge" id="tz_${sid}">UTC</span></div>
    `;

    const vd = document.createElement("div"); vd.className = "v-divider";
    const people = document.createElement("div");
    people.className = "people";
    people.id = `people_${sid}`;

    // Normalise people entries to {name, slack} objects
    city.people = city.people.map(p => typeof p === "string" ? { name: p, slack: p.toLowerCase() } : p);

    city.people.forEach(p => {
      const a = document.createElement("a");
      a.className = "person";
      a.href = p.url || `https://slack.com/app_redirect?channel=@${p.slack}`;
      a.target = "_blank"; a.rel = "noopener noreferrer";
      a.title = `Message ${p.name} on Slack`;
      a.innerHTML = `<div class="avatar">${p.name.slice(0,2).toUpperCase()}</div><span class="person-name">${p.name}</span>`;
      people.appendChild(a);
    });

    if (city.people.length === 0) {
      people.style.minHeight = "30px";
    }

    top.appendChild(left); top.appendChild(vd); top.appendChild(people);

    const hd = document.createElement("div"); hd.className = "h-divider";
    const sc = document.createElement("div"); sc.className = "timeline-scroll";
    const ht = document.createElement("div"); ht.className = "hour-track"; ht.id = `ht_${sid}`;

    sc.appendChild(ht);
    sc.addEventListener("scroll", () => syncScroll(sc), { passive: true });
    makeDraggable(sc);
    allScrollEls.push(sc);

    card.appendChild(top); card.appendChild(hd); card.appendChild(sc);
    main.appendChild(card);
  });

  // ── Build timeline ───────────────────────────────────
  function buildTimelines(bMs) {
    cities.forEach(city => {
      const sid = city.tz.replace("/","_") + "_" + city.name.replace(/\s/g,"");
      const ht  = document.getElementById(`ht_${sid}`);
      ht.innerHTML = "";
      let prevDate = null;

      for (let i = 0; i < TOTAL; i++) {
        const t       = slotAt(bMs, i);
        const isCur   = i === PAST;
        const lh      = localHourNum(t, city.tz);
        const dateStr = fmtDate(t, city.tz);
        const isNewDay = dateStr !== prevDate;
        prevDate = dateStr;

        const hc = document.createElement("div");
        hc.className = "hour-col"
          + (isCur             ? " current"  : "")
          + (isNewDay && !isCur ? " midnight" : "");

        hc.style.width = COL_W + "px";

        if (isCur) {
          hc.style.background = "#333333";
          hc.style.color = "#fff";
          hc.style.borderRadius = "4px";
        } else {
          hc.style.background = slotBg(lh);
          hc.style.color = slotFg(lh);
        }

        // Midnight columns: two-line label (weekday + day number)
        if (isNewDay && !isCur) {
          hc.style.flexDirection = "column";
          hc.style.lineHeight = "1.1";
          hc.style.fontSize = "8px";
          hc.style.fontWeight = "700";
          hc.style.letterSpacing = "0";
          hc.style.background = "#F24B23";
          hc.style.color = "#fff";
          const label = midnightLabel(t, city.tz); // "Mon\n30"
          const [wday, dnum] = label.split("\n");
          hc.innerHTML = `<span style="opacity:0.8">${wday}</span><span>${dnum}</span>`;
        } else {
          // Plain hour number (0–23), matching WorldTimeBuddy
          hc.textContent = isCur ? String(lh) : (lh === 0 ? "0" : String(lh));
        }

        hc.title = `${fmtDate(t, city.tz)} ${lh}:00`;
        hc.dataset.slotMs = t.getTime();

        // Left half of column = :00, right half = :30
        hc.addEventListener("click", function(e) {
          e.stopPropagation();
          const rect    = this.getBoundingClientRect();
          const isRight = (e.clientX - rect.left) >= rect.width / 2;
          const halfOff = isRight ? 30 * 60_000 : 0;
          selSlotMs = parseInt(this.dataset.slotMs) + halfOff; // stores exact :00 or :30
          updateSelIndicator();
          showPopup(selSlotMs, e.clientX, e.clientY);
        });

        ht.appendChild(hc);
      }
    });
  }

  // ── Tick ─────────────────────────────────────────────
  function tick() {
    const now = new Date();
    cities.forEach(city => {
      const sid = city.tz.replace("/","_") + "_" + city.name.replace(/\s/g,"");
      document.getElementById(`time_${sid}`).textContent = now.toLocaleTimeString("en-GB",{
        timeZone:city.tz, hour:"2-digit", minute:"2-digit", second:"2-digit"
      });
      document.getElementById(`dated_${sid}`).textContent = now.toLocaleDateString("en-GB",{
        timeZone:city.tz, weekday:"short", month:"short", day:"numeric"
      });
      document.getElementById(`tz_${sid}`).textContent = getUTCOffset(city.tz, now);
    });
  }

  // ── CSV people loader ─────────────────────────────────
  // Tries to fetch people.csv from the same folder.
  // CSV format: name,timezone,slack_handle
  // Falls back to hardcoded data if the file isn't found.
  function applyPeople(csvText) {
    const rows = csvText.trim().split("\n").slice(1); // skip header
    // Clear existing people from all cities
    cities.forEach(c => c.people = []);
    rows.forEach(row => {
      const cols = row.split(",").map(s => s.trim());
      if (cols.length < 2) return;
      const [name, tz, slackHandle, url] = cols;
      if (!name || !tz) return;
      const city = cities.find(c => c.tz === tz);
      if (city) {
        city.people.push({ name, slack: slackHandle || name.toLowerCase(), url: url || null });
      }
    });
    // Convert plain-string people to objects if they aren't already
    cities.forEach(c => {
      c.people = c.people.map(p => typeof p === "string" ? { name: p, slack: p.toLowerCase() } : p);
    });
  }

  // Rebuild the people section in a card without re-rendering the timeline
  function refreshPeopleCards() {
    cities.forEach(city => {
      const sid = city.tz.replace("/","_") + "_" + city.name.replace(/\s/g,"");
      const peopleEl = document.getElementById(`people_${sid}`);
      if (!peopleEl) return;
      peopleEl.innerHTML = "";
      city.people.forEach(p => {
        const a = document.createElement("a");
        a.className = "person";
        a.href = p.url || `https://slack.com/app_redirect?channel=@${p.slack}`;
        a.target = "_blank"; a.rel = "noopener noreferrer";
        a.title = `Message ${p.name} on Slack`;
        a.innerHTML = `<div class="avatar">${p.name.slice(0,2).toUpperCase()}</div><span class="person-name">${p.name}</span>`;
        peopleEl.appendChild(a);
      });
    });
  }

  // ── Init ─────────────────────────────────────────────
  baseMs = getBase().getTime();
  buildTimelines(baseMs);
  tick();

  requestAnimationFrame(() => {
    const visibleW = allScrollEls[0].clientWidth;
    // Centre the "now" column in view
    const target = PAST * COL_W - Math.floor(visibleW / 2) + COL_W / 2;
    allScrollEls.forEach(el => { el.scrollLeft = Math.max(0, target); });
  });

  setInterval(tick, 1000);

  // Try loading people.csv (works when served from a local/web server)
  fetch("people.csv")
    .then(r => { if (!r.ok) throw new Error("no csv"); return r.text(); })
    .then(csv => { applyPeople(csv); refreshPeopleCards(); })
    .catch(() => { /* silent — hardcoded data already rendered */ });
</script>
</body>
</html>
